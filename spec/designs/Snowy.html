<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snowy — PostgreSQL client</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/sample-data.jsx"></script>
<script type="text/babel" src="components/window-chrome.jsx"></script>
<script type="text/babel" src="components/sidebar.jsx"></script>
<script type="text/babel" src="components/data-grid.jsx"></script>
<script type="text/babel" src="components/workspace.jsx"></script>
<script type="text/babel" src="components/sql-editor.jsx"></script>
<script type="text/babel" src="components/connection-manager.jsx"></script>
<script type="text/babel" src="components/new-console-overlays.jsx"></script>

<script type="text/babel" data-presets="react">
/* global DesignCanvas, DCSection, DCArtboard, SnowyLight, SnowyDark, WindowShell, TitleBar, SnowySidebar, Workspace, SQLEditor, ConnectionManager, NewConsoleOverlays */

// Three priority screens, each in light + dark.
const W = 1440, H = 900;

function AppFrame({ theme, children }) {
  return <WindowShell theme={theme}>{children}</WindowShell>;
}

function TopBar({ theme, path }) {
  const t = theme;
  return (
    <TitleBar theme={t}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: t.text }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
          <span style={{ fontWeight: 600 }}>Snowy</span>
        </div>
        <span style={{ color: t.textDim }}>—</span>
        <span style={{ color: t.textSec, fontFamily: SnowyTokens.font.mono, fontSize: 12 }}>{path}</span>
      </div>
      <div style={{ flex: 1 }} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 10px', background: t.panel, border: `0.5px solid ${t.border}`, borderRadius: 5, fontSize: 11.5, color: t.textDim, width: 220 }}>
        <Ico.Search size={11} />
        <span>Find anything…</span>
        <div style={{ flex: 1 }} />
        <span style={{ fontFamily: SnowyTokens.font.mono, fontSize: 10, padding: '0 4px', background: t.hover, borderRadius: 3 }}>⌘K</span>
      </div>
    </TitleBar>
  );
}

// 1. Database view — workspace with DataGrip-style layout
function ScreenWorkspace({ theme, expandTable = false, selectedTable = 'users', overlays = null }) {
  return (
    <AppFrame theme={theme}>
      <TopBar theme={theme} path="snowy@dev · mydatabase.public" />
      <div style={{ flex: 1, display: 'flex', minHeight: 0, position: 'relative' }}>
        <SnowySidebar theme={theme} selectedTable={selectedTable} expandTable={expandTable} />
        <Workspace theme={theme} />
        {overlays}
      </div>
    </AppFrame>
  );
}

// 2. Query editor with autocomplete
function ScreenEditor({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TopBar theme={theme} path="snowy@dev · mydatabase.public · daily_pnl.sql" />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <SnowySidebar theme={theme} selectedTable={null} />
        <SQLEditor theme={theme} />
      </div>
    </AppFrame>
  );
}

// 3. Connection management
function ScreenConnection({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TopBar theme={theme} path="Data sources" />
      <ConnectionManager theme={theme} />
    </AppFrame>
  );
}

function App() {
  const pair = (Screen, label, props = {}) => [
    <DCArtboard key={`${label}-light`} id={`${label}-light`} label={`${label} · Light`} width={W} height={H}>
      <Screen theme={SnowyLight} {...props} />
    </DCArtboard>,
    <DCArtboard key={`${label}-dark`} id={`${label}-dark`} label={`${label} · Dark`} width={W} height={H}>
      <Screen theme={SnowyDark} {...props} />
    </DCArtboard>,
  ];

  return (
    <DesignCanvas>
      <DCSection id="explorer" title="① Database Explorer" subtitle="Flat tree: snowy@dev → mydatabase → public → tables · sequences. Database Objects / virtual views / Server Objects dropped — 95 % of sessions only care about tables and sequences, so surfacing the other folders just adds noise. Toolbar: ＋ · data-source settings · synchronize · stop · query console · jump-to-table · DDL · diagram · preview.">
        {pair(ScreenWorkspace, 'DB-Explorer', { selectedTable: 'users', expandTable: false })}
      </DCSection>

      <DCSection id="explorer-expanded" title="① Table drill-in — columns · keys · indexes" subtitle="Clicking a table expands it inline: columns with type annotations and defaults, then keys, foreign keys, indexes, checks subfolders. PK/FK/regular column glyphs match DataGrip.">
        {pair(ScreenWorkspace, 'Table-Expanded', { selectedTable: 'accounts', expandTable: true })}
      </DCSection>

      <DCSection id="editor" title="② Query editor — low-latency autocomplete" subtitle="Keyword, column, table and function completions in the same popover; ranked by column metadata (FK/PK, indexed, hot). Run gutter ticks mark the last successful executions; result tabs below show pinned previous runs so you can diff.">
        {pair(ScreenEditor, 'Editor')}
      </DCSection>

      <DCSection id="new-console" title="④ Creating a new query console" subtitle="Three discoverable entry points, all leading to the same result: (1) sidebar toolbar icon — a console glyph with a small ＋ badge, keyboard ⌘⇧N; (2) right-click any connection / schema / table → New → Query Console, which inherits the clicked object's context; (3) the ＋ tab in the console tab strip, which duplicates the active session. Each console has its own transaction so changes don't leak between tabs.">
        <DCArtboard id="New-Console-light" label="New Console · Light" width={W} height={H}>
          <ScreenWorkspace theme={SnowyLight} selectedTable="users" overlays={<NewConsoleOverlays theme={SnowyLight} />} />
        </DCArtboard>
        <DCArtboard id="New-Console-dark" label="New Console · Dark" width={W} height={H}>
          <ScreenWorkspace theme={SnowyDark} selectedTable="users" overlays={<NewConsoleOverlays theme={SnowyDark} />} />
        </DCArtboard>
      </DCSection>

      <DCSection id="connect" title="③ Connection manager — CRUD + test + keychain" subtitle="Left rail lists all data sources with online/offline dot. Right pane is a tabbed editor (General · Options · SSH/SSL · Schemas · Advanced). Password field is explicit, with Save to Keychain and Ask every time toggles. Test Connection pill shows latency.">
        {pair(ScreenConnection, 'Connections')}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
