<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snowy — PostgreSQL client</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/sample-data.jsx"></script>
<script type="text/babel" src="components/window-chrome.jsx"></script>
<script type="text/babel" src="components/sidebar.jsx"></script>
<script type="text/babel" src="components/data-grid.jsx"></script>
<script type="text/babel" src="components/workspace.jsx"></script>
<script type="text/babel" src="components/sql-editor.jsx"></script>
<script type="text/babel" src="components/dashboard.jsx"></script>
<script type="text/babel" src="components/connection-manager.jsx"></script>
<script type="text/babel" src="components/query-history.jsx"></script>

<script type="text/babel" data-presets="react">
/* global DesignCanvas, DCSection, DCArtboard, DCPostIt, SnowyLight, SnowyDark, WindowShell, TitleBar, TrafficLights, SnowySidebar, Workspace, SQLEditor, Dashboard, ConnectionManager, QueryHistory */

// Each artboard shows the full Snowy app at macOS-window chrome scale.
// Width/height are sized for DataGrip-class density.
const W = 1440, H = 900;

function AppFrame({ theme, label, children }) {
  return (
    <WindowShell theme={theme}>
      {children}
    </WindowShell>
  );
}

// ─────────────────────────────────────────────────────────────
// Screen: Workspace (main table/data grid view)
function ScreenWorkspace({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TitleBar theme={theme}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: theme.text }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
            <span style={{ fontWeight: 600 }}>Snowy</span>
          </div>
          <span style={{ color: theme.textDim }}>—</span>
          <span style={{ color: theme.textSec, fontFamily: SnowyTokens.font.mono, fontSize: 12 }}>Ledger Core · production</span>
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <div style={{ padding: '3px 7px', color: theme.textSec, display: 'flex', alignItems: 'center', gap: 4 }}><Ico.Sidebar size={13} /></div>
          <div style={{ padding: '3px 7px', color: theme.textSec, display: 'flex', alignItems: 'center', gap: 4 }}><Ico.Split size={13} /></div>
          <div style={{ padding: '3px 7px', color: theme.textSec, display: 'flex', alignItems: 'center', gap: 4 }}><Ico.Sparkle size={13} /></div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 10px', background: theme.panel, border: `0.5px solid ${theme.border}`, borderRadius: 5, fontSize: 11.5, color: theme.textDim, width: 240 }}>
            <Ico.Search size={11} />
            <span>Find anything…</span>
            <div style={{ flex: 1 }} />
            <span style={{ fontFamily: SnowyTokens.font.mono, fontSize: 10, padding: '0 4px', background: theme.hover, borderRadius: 3 }}>⌘K</span>
          </div>
        </div>
      </TitleBar>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <SnowySidebar theme={theme} />
        <Workspace theme={theme} />
      </div>
    </AppFrame>
  );
}

function ScreenEditor({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TitleBar theme={theme}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: theme.text }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
            <span style={{ fontWeight: 600 }}>Snowy</span>
          </div>
          <span style={{ color: theme.textDim }}>—</span>
          <span style={{ color: theme.textSec, fontFamily: SnowyTokens.font.mono, fontSize: 12 }}>Ledger Core · production · daily_pnl.sql</span>
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 10px', background: theme.panel, border: `0.5px solid ${theme.border}`, borderRadius: 5, fontSize: 11.5, color: theme.textDim, width: 240 }}>
            <Ico.Search size={11} />
            <span>Find anything…</span>
            <div style={{ flex: 1 }} />
            <span style={{ fontFamily: SnowyTokens.font.mono, fontSize: 10, padding: '0 4px', background: theme.hover, borderRadius: 3 }}>⌘K</span>
          </div>
        </div>
      </TitleBar>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <SnowySidebar theme={theme} selectedTable={null} />
        <SQLEditor theme={theme} />
      </div>
    </AppFrame>
  );
}

function ScreenDashboard({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TitleBar theme={theme}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: theme.text }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
            <span style={{ fontWeight: 600 }}>Snowy</span>
          </div>
          <span style={{ color: theme.textDim }}>—</span>
          <span style={{ color: theme.textSec, fontFamily: SnowyTokens.font.mono, fontSize: 12 }}>Ledger Core · Overview</span>
        </div>
        <div style={{ flex: 1 }} />
      </TitleBar>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <SnowySidebar theme={theme} selectedTable={null} />
        <Dashboard theme={theme} />
      </div>
    </AppFrame>
  );
}

function ScreenConnection({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TitleBar theme={theme}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: theme.text }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
            <span style={{ fontWeight: 600 }}>Snowy</span>
          </div>
          <span style={{ color: theme.textDim }}>—</span>
          <span style={{ color: theme.textSec }}>Connections</span>
        </div>
        <div style={{ flex: 1 }} />
      </TitleBar>
      <ConnectionManager theme={theme} />
    </AppFrame>
  );
}

function ScreenHistory({ theme }) {
  return (
    <AppFrame theme={theme}>
      <TitleBar theme={theme}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: theme.text }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: 'linear-gradient(135deg, oklch(0.72 0.14 240), oklch(0.54 0.18 240))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 9, fontWeight: 800 }}>S</div>
            <span style={{ fontWeight: 600 }}>Snowy</span>
          </div>
          <span style={{ color: theme.textDim }}>—</span>
          <span style={{ color: theme.textSec, fontFamily: SnowyTokens.font.mono, fontSize: 12 }}>Ledger Core · history</span>
        </div>
        <div style={{ flex: 1 }} />
      </TitleBar>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <SnowySidebar theme={theme} selectedTable={null} />
        <QueryHistory theme={theme} />
      </div>
    </AppFrame>
  );
}

// ─────────────────────────────────────────────────────────────
function App() {
  const pair = (Screen, label) => [
    <DCArtboard key={`${label}-light`} id={`${label}-light`} label={`${label} · Light`} width={W} height={H}>
      <Screen theme={SnowyLight} />
    </DCArtboard>,
    <DCArtboard key={`${label}-dark`} id={`${label}-dark`} label={`${label} · Dark`} width={W} height={H}>
      <Screen theme={SnowyDark} />
    </DCArtboard>,
  ];

  return (
    <DesignCanvas>
      <DCSection id="workspace" title="Workspace — schema tree + data grid" subtitle="The default view. Projects → connections → schemas → tables; dense DataGrip-style grid with row inspector.">
        {pair(ScreenWorkspace, 'Workspace')}
      </DCSection>

      <DCSection id="editor" title="SQL editor — autocomplete + AI copilot" subtitle="Keyword/column/table autocomplete inline. Snowy AI leaves contextual suggestions below the code, non-intrusive.">
        {pair(ScreenEditor, 'SQL Editor')}
      </DCSection>

      <DCSection id="dashboard" title="Dashboard — pinned query tiles" subtitle="A signature Snowy move: any saved query can be pinned as a live tile. Stats, charts, and lists compose one ops view.">
        {pair(ScreenDashboard, 'Dashboard')}
      </DCSection>

      <DCSection id="history" title="Query history" subtitle="Every query you've run, with saved/failed/DDL filters. Re-run, inspect plan, or star to keep.">
        {pair(ScreenHistory, 'History')}
      </DCSection>

      <DCSection id="connect" title="Connection manager" subtitle="Projects group connections (local · dev · prod). Launch screen + recent activity.">
        {pair(ScreenConnection, 'Connections')}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
